name: Build Sandbox Image (ymagine)

# Builds the sandbox image (core/docker/Dockerfile — kortix/computer, which
# bakes the fork's core/kortix-master incl. the multi-project fix) and pushes
# it to GHCR. Uses the built-in GITHUB_TOKEN — NO Docker Hub creds needed.
#
# After it publishes, point the API's SANDBOX_IMAGE env at the tag and update
# the sandbox. The fork can finally run its own sandbox backend. (D-022)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. projects-fix)'
        required: true
        default: projects-fix
      no_cache:
        description: 'Clean rebuild — skip cache, pull fresh apt/pip/npm (run ~monthly for security; also refreshes :buildcache)'
        type: boolean
        default: false

jobs:
  build:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "/opt/hostedtoolcache/CodeQL" || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          IMG="ghcr.io/${{ github.repository_owner }}/ymagineapp-computer"
          # Registry layer cache. mode=min (NOT max): a full-layer export of a ~20GB image
          # can run the runner disk out of space (claude-failure-modes §13.1). ignore-error
          # so a cache hiccup never fails the build. Bases are digest-pinned in the Dockerfile
          # so the cache can't serve a stale base; apt/pip/npm freeze at cache-populate time
          # and are refreshed by re-running with no_cache=true (see input).
          CACHE="--cache-from type=registry,ref=${IMG}:buildcache --cache-to type=registry,ref=${IMG}:buildcache,mode=min,ignore-error=true"
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            CACHE="--no-cache --cache-to type=registry,ref=${IMG}:buildcache,mode=min,ignore-error=true"
            echo "no_cache=true → clean rebuild (fresh apt/pip/npm; refreshing :buildcache)"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file core/docker/Dockerfile \
            --build-arg "SANDBOX_VERSION=${TAG}" \
            ${CACHE} \
            --tag "${IMG}:${TAG}" \
            --push \
            .
          echo "Pushed ${IMG}:${TAG}"
          echo "Set the API env: SANDBOX_IMAGE=${IMG}:${TAG}, then update the sandbox."
